# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano
#     shield: reviung41
#   - board: nice_nano
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#

include:
  # 1. The Dongle (Central Brain)
  # Uses the left matrix, but configured to look for 2 wireless halves
  - board: nice_nano_v2
    shield: cradio_left
    cmake-args: "-DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2"
    artifact-name: dongle_firmware

  # 2. The Left Half (Forced to be a Peripheral)
  # We use cmake-args to strip its "central" privileges away
  - board: nice_nano_v2
    shield: cradio_left
    cmake-args: "-DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n"
    artifact-name: left_peripheral_firmware

  # 3. The Right Half (Peripheral by Default)
  # The right half is already a peripheral out of the box!
  - board: nice_nano_v2
    shield: cradio_right
    artifact-name: right_peripheral_firmware